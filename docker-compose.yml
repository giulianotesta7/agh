services:
  agh:
    image: ghcr.io/giulianotesta7/agent-guidance-hub:${AGH_IMAGE_TAG:-latest}
    ports:
      - "8912:8912"
    volumes:
      - agh-data:/data
    environment:
      AGH_BOOTSTRAP_OWNER_EMAIL: owner@example.com
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  agh-data:
    name: agh-data
