name: Bug report
description: Report a reproducible AGH bug
title: "fix: "
labels: [bug, status:needs-review]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I understand a maintainer must add status:approved before a PR is opened.
          required: true
  - type: textarea
    id: bug
    attributes:
      label: Bug description
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use numbered steps.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - CLI
        - Server/API
        - Docker/runtime
        - Packs
        - Workspace pull
        - Documentation
        - CI/release
        - Other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - WSL
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
  - type: textarea
    id: context
    attributes:
      label: Additional context
