name: CD GHCR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Container version tag to publish"
        required: true
      confirm:
        description: "Type publish to confirm GHCR publication"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: ghcr
    if: github.event.inputs.confirm == 'publish'

    env:
      IMAGE_NAME: ghcr.io/giulianotesta7/agent-guidance-hub
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify version
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          version = os.environ["VERSION"]
          if not re.fullmatch(r"(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)", version):
              print(f"invalid version: {version!r}")
              sys.exit(1)

          pyproject_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          if pyproject_version != version:
              print(f"pyproject version {pyproject_version!r} does not match workflow input {version!r}")
              sys.exit(1)
          print(f"Publishing container version: {version}")
          PY

      - name: Check Dockerfile
        run: docker build --check .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:latest
