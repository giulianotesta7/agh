name: PR Validation

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  validate:
    name: Validate PR metadata
    runs-on: ubuntu-latest

    steps:
      - name: Check linked approved issue and type label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const labels = pr.labels.map((label) => label.name);

            const typeLabels = labels.filter((name) => name.startsWith("type:"));
            if (typeLabels.length !== 1) {
              core.setFailed(`PR must have exactly one type:* label; found ${typeLabels.length}.`);
              return;
            }

            const issueRefs = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi)]
              .map((match) => Number(match[1]));
            const uniqueIssueRefs = [...new Set(issueRefs)];

            if (uniqueIssueRefs.length === 0) {
              core.setFailed("PR body must link an approved issue with Closes #N, Fixes #N, or Resolves #N.");
              return;
            }

            const { owner, repo } = context.repo;
            for (const issue_number of uniqueIssueRefs) {
              const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number });
              if (issue.pull_request) {
                core.setFailed(`#${issue_number} is a pull request, not an issue.`);
                return;
              }
              const issueLabels = issue.labels.map((label) =>
                typeof label === "string" ? label : label.name
              );
              if (!issueLabels.includes("status:approved")) {
                core.setFailed(`#${issue_number} must have status:approved before this PR can merge.`);
                return;
              }
            }

            core.info(`Validated ${uniqueIssueRefs.length} linked issue(s): ${uniqueIssueRefs.join(", ")}`);
