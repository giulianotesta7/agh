name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        id: version
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          ref = os.environ["GITHUB_REF_NAME"]
          match = re.fullmatch(r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))", ref)
          if not match:
              print(f"release tag must look like vMAJOR.MINOR.PATCH, got {ref!r}")
              sys.exit(1)
          version = match.group(1)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
          print(f"Release version: {version}")
          PY

      - name: Verify release tag is on main and highest SemVer tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          version = os.environ["VERSION"]
          version_tuple = tuple(int(part) for part in version.split("."))

          branches = subprocess.check_output(
              ["git", "branch", "-r", "--contains", "HEAD"], text=True
          ).splitlines()
          if not any(branch.strip() == "origin/main" for branch in branches):
              print("release tag must point to a commit contained in origin/main")
              sys.exit(1)

          tags = subprocess.check_output(["git", "tag", "--list", "v*"], text=True).splitlines()
          semver_tags = []
          for tag in tags:
              match = re.fullmatch(r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))", tag)
              if match:
                  semver_tags.append((tuple(int(part) for part in match.group(1).split(".")), tag))

          higher = [tag for parsed, tag in semver_tags if parsed > version_tuple]
          if higher:
              print(f"release tag v{version} is not the highest SemVer tag; higher tags: {higher}")
              sys.exit(1)
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check lockfile
        run: uv lock --locked

      - name: Run tests
        run: uv run pytest -q

      - name: Run Ruff lint
        run: uv run --with ruff ruff check .

      - name: Check Ruff formatting
        run: uv run --with ruff ruff format --check .

      - name: Run Pyright
        run: uv run --with pyright pyright agh tests

      - name: Check Dockerfile
        run: docker build --check .

      - name: Test Docker runtime hardening
        run: AGH_STRICT_DOCKER_RUNTIME=1 uv run pytest tests/test_docker_runtime.py -q

  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: validate
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: uv build

      - name: Verify built package version
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python - <<'PY'
          import glob
          import os
          import sys

          version = os.environ["VERSION"]
          wheels = glob.glob(f"dist/agh-{version}-*.whl")
          sdists = glob.glob(f"dist/agh-{version}.tar.gz")
          if len(wheels) != 1 or len(sdists) != 1:
              print("built artifacts do not match release version")
              print("wheels:", wheels)
              print("sdists:", sdists)
              sys.exit(1)
          print("Built artifacts:", wheels[0], sdists[0])
          PY

      - name: Install built CLI
        run: uv tool install --force dist/*.whl

      - name: Check installed CLI
        run: agh --help

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-ghcr:
    name: Publish GHCR
    runs-on: ubuntu-latest
    needs: validate
    environment: ghcr

    env:
      IMAGE_NAME: ghcr.io/giulianotesta7/agent-guidance-hub

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Re-verify release tag before publishing latest
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          version = os.environ["VERSION"]
          version_tuple = tuple(int(part) for part in version.split("."))

          branches = subprocess.check_output(
              ["git", "branch", "-r", "--contains", "HEAD"], text=True
          ).splitlines()
          if not any(branch.strip() == "origin/main" for branch in branches):
              print("release tag must point to a commit contained in origin/main")
              sys.exit(1)

          tags = subprocess.check_output(["git", "tag", "--list", "v*"], text=True).splitlines()
          semver_tags = []
          for tag in tags:
              match = re.fullmatch(r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))", tag)
              if match:
                  semver_tags.append((tuple(int(part) for part in match.group(1).split(".")), tag))

          higher = [tag for parsed, tag in semver_tags if parsed > version_tuple]
          if higher:
              print(f"release tag v{version} is not the highest SemVer tag; higher tags: {higher}")
              sys.exit(1)
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            AGH_VERSION=${{ needs.validate.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - publish-pypi
      - publish-ghcr

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew tap
    runs-on: macos-latest
    permissions:
      contents: read
    needs:
      - validate
      - publish-pypi
      - publish-ghcr
      - github-release

    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: giulianotesta7/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: false

      - name: Register local tap checkout
        run: brew tap giulianotesta7/homebrew-tap "$PWD"

      - name: Update formula from PyPI
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          version = os.environ["VERSION"]
          formula_path = Path("Formula/agh.rb")
          data_url = "https://pypi.org/pypi/agh/json"

          with urllib.request.urlopen(data_url, timeout=30) as response:
              payload = json.load(response)

          release_files = payload["releases"].get(version, [])
          sdist = next((item for item in release_files if item.get("packagetype") == "sdist"), None)
          if sdist is None:
              raise SystemExit(f"No sdist found on PyPI for agh {version}")

          url = sdist["url"]
          with urllib.request.urlopen(url, timeout=30) as response:
              sha256 = hashlib.sha256(response.read()).hexdigest()

          text = formula_path.read_text(encoding="utf-8")
          text, url_replacements = re.subn(
              r'url "https://files\.pythonhosted\.org/[^"]+/agh-[^"]+\.tar\.gz"',
              f'url "{url}"',
              text,
              count=1,
          )
          text, sha_replacements = re.subn(
              r'sha256 "[0-9a-f]{64}"',
              f'sha256 "{sha256}"',
              text,
              count=1,
          )
          if url_replacements != 1 or sha_replacements != 1:
              raise SystemExit(
                  "Expected to replace exactly one formula URL and sha256; "
                  f"got url={url_replacements}, sha256={sha_replacements}"
              )
          formula_path.write_text(text, encoding="utf-8")

          print(f"Updated agh formula to {version}")
          print(f"sdist: {url}")
          print(f"sha256: {sha256}")
          PY

      - name: Update Python resources
        run: brew update-python-resources Formula/agh.rb

      - name: Audit formula
        run: brew audit --strict --online Formula/agh.rb

      - name: Create Homebrew tap pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: agh-${{ needs.validate.outputs.version }}
          delete-branch: true
          commit-message: agh ${{ needs.validate.outputs.version }}
          title: agh ${{ needs.validate.outputs.version }}
          body: |
            Updates `agh` to `${{ needs.validate.outputs.version }}`.

            Source release: https://github.com/giulianotesta7/AgentGuidanceHub/releases/tag/v${{ needs.validate.outputs.version }}
            PyPI package: https://pypi.org/project/agh/${{ needs.validate.outputs.version }}/
