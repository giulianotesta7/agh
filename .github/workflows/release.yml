name: Release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "agh/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tests/test_cli_version.py"
      - "tests/test_release_workflow.py"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Derive release version
        id: version
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          semver_pattern = r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))"
          ref = os.environ["GITHUB_REF_NAME"]
          if os.environ["GITHUB_EVENT_NAME"] == "pull_request":
              version = "0.0.0"
          else:
              match = re.fullmatch(semver_pattern, ref)
              if not match:
                  print(
                      "release tag must look like vMAJOR.MINOR.PATCH, "
                      f"got {ref!r}"
                  )
                  sys.exit(1)
              version = match.group(1)
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
          print(f"Release version: {version}")
          PY

      - name: Verify changelog entry
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: grep -F "## ${VERSION} -" CHANGELOG.md

      - name: Verify release tag is on main and highest SemVer tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          version = os.environ["VERSION"]
          version_tuple = tuple(int(part) for part in version.split("."))

          branches = subprocess.check_output(
              ["git", "branch", "-r", "--contains", "HEAD"], text=True
          ).splitlines()
          if not any(branch.strip() == "origin/main" for branch in branches):
              print(
                  "release tag must point to a commit contained in "
                  "origin/main"
              )
              sys.exit(1)

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*"], text=True
          ).splitlines()
          semver_pattern = r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))"
          semver_tags = []
          for tag in tags:
              match = re.fullmatch(semver_pattern, tag)
              if match:
                  parsed = tuple(
                      int(part) for part in match.group(1).split(".")
                  )
                  semver_tags.append((parsed, tag))

          higher = [
              tag for parsed, tag in semver_tags if parsed > version_tuple
          ]
          if higher:
              print(
                  f"release tag v{version} is not the highest SemVer tag; "
                  f"higher tags: {higher}"
              )
              sys.exit(1)
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Check lockfile
        run: uv lock --locked

      - name: Run tests
        run: uv run pytest -q

      - name: Run Ruff lint
        run: uv run --with ruff ruff check .

      - name: Check Ruff formatting
        run: uv run --with ruff ruff format --check .

      - name: Run Pyright
        run: uv run --with pyright pyright agh tests

      - name: Check Dockerfile
        run: docker build --check .

      - name: Test Docker runtime hardening
        run: >
          AGH_STRICT_DOCKER_RUNTIME=1
          uv run pytest tests/test_docker_runtime.py -q

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-2022
            python-architecture: x64
          - arch: arm64
            runner: windows-11-arm
            python-architecture: arm64
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python-architecture }}

      - name: Check lockfile
        run: uv lock --locked

      - name: Build frozen CLI
        shell: pwsh
        run: |
          $env:SETUPTOOLS_SCM_PRETEND_VERSION_FOR_AGH = $env:VERSION
          uv run --locked --group release pyinstaller `
            --clean `
            --noconfirm `
            --onefile `
            --name agh `
            --copy-metadata agh `
            agh/cli/main.py

      - name: Validate frozen CLI version
        shell: pwsh
        run: |
          $actual = (& .\dist\agh.exe --version).Trim()
          if ($actual -ne "agh $env:VERSION") {
            throw "Expected frozen version 'agh $env:VERSION', got '$actual'"
          }

      - name: Create deterministic zip
        shell: pwsh
        run: |
          $asset = "agh-$env:VERSION-windows-$env:ARCH.zip"
          New-Item -ItemType Directory -Force -Path release-root | Out-Null
          Copy-Item .\dist\agh.exe .\release-root\agh.exe
          Push-Location release-root
          Compress-Archive -Path agh.exe -DestinationPath "..\$asset" -Force
          Pop-Location
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Move-Item $asset "release\$asset"

      - name: Validate zip layout
        shell: pwsh
        run: |
          $asset = "release\agh-$env:VERSION-windows-$env:ARCH.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($asset)
          try {
            $entries = @($zip.Entries | ForEach-Object { $_.FullName })
            if ($entries -notcontains "agh.exe") {
              throw "Archive is missing root agh.exe"
            }
          } finally {
            $zip.Dispose()
          }

      - name: Upload Windows asset
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-${{ matrix.arch }}-asset
          path: release/agh-${{ env.VERSION }}-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  preflight-scoop:
    name: Preflight Scoop bucket
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate
    permissions:
      contents: read

    steps:
      - name: Validate Scoop bucket write and PR access
        env:
          GH_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          gh repo view giulianotesta7/scoop-agh >/dev/null
          gh api \
            repos/giulianotesta7/scoop-agh/contents/bucket/agh.json \
            --jq .name | grep -Fx agh.json

          branch="agh-preflight-${GITHUB_RUN_ID}"
          gh repo clone giulianotesta7/scoop-agh scoop-preflight
          cd scoop-preflight
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git commit --allow-empty -m "preflight ${GITHUB_RUN_ID}"
          auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          auth_header="AUTHORIZATION: basic ${auth}"
          cleanup() {
            git -c http.https://github.com/.extraheader="$auth_header" \
              push --delete \
              https://github.com/giulianotesta7/scoop-agh.git \
              "$branch" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          git -c http.https://github.com/.extraheader="$auth_header" \
            push --force-with-lease \
            https://github.com/giulianotesta7/scoop-agh.git "$branch"
          pr_url=$(gh pr create \
            --repo giulianotesta7/scoop-agh \
            --head "$branch" \
            --base main \
            --draft \
            --title "preflight ${GITHUB_RUN_ID}" \
            --body "Temporary release preflight PR.")
          gh pr close "$pr_url" \
            --repo giulianotesta7/scoop-agh \
            --delete-branch

  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate
      - build-windows
      - github-release
      - preflight-scoop
    permissions:
      contents: read
      id-token: write
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build package
        run: uv build

      - name: Verify built package version
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python - <<'PY'
          import glob
          import os
          import sys

          version = os.environ["VERSION"]
          wheels = glob.glob(f"dist/agh-{version}-*.whl")
          sdists = glob.glob(f"dist/agh-{version}.tar.gz")
          if len(wheels) != 1 or len(sdists) != 1:
              print("built artifacts do not match release version")
              print("wheels:", wheels)
              print("sdists:", sdists)
              sys.exit(1)
          print("Built artifacts:", wheels[0], sdists[0])
          PY

      - name: Install built CLI
        run: uv tool install --force dist/*.whl

      - name: Check installed CLI
        run: agh --help

      - name: Publish to PyPI
        uses: >-
          pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

  publish-ghcr:
    name: Publish GHCR
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate
      - build-windows
      - github-release
      - preflight-scoop
    permissions:
      contents: read
      packages: write
    environment: ghcr

    env:
      IMAGE_NAME: ghcr.io/giulianotesta7/agent-guidance-hub

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Re-verify release tag before publishing latest
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          version = os.environ["VERSION"]
          version_tuple = tuple(int(part) for part in version.split("."))

          branches = subprocess.check_output(
              ["git", "branch", "-r", "--contains", "HEAD"], text=True
          ).splitlines()
          if not any(branch.strip() == "origin/main" for branch in branches):
              print(
                  "release tag must point to a commit contained in "
                  "origin/main"
              )
              sys.exit(1)

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*"], text=True
          ).splitlines()
          semver_pattern = r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))"
          semver_tags = []
          for tag in tags:
              match = re.fullmatch(semver_pattern, tag)
              if match:
                  parsed = tuple(
                      int(part) for part in match.group(1).split(".")
                  )
                  semver_tags.append((parsed, tag))

          higher = [
              tag for parsed, tag in semver_tags if parsed > version_tuple
          ]
          if higher:
              print(
                  f"release tag v{version} is not the highest SemVer tag; "
                  f"higher tags: {higher}"
              )
              sys.exit(1)
          PY

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          build-args: |
            AGH_VERSION=${{ needs.validate.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate
      - build-windows
      - preflight-scoop
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: windows-*-asset
          path: windows-assets
          merge-multiple: true

      - name: Verify Windows release assets
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          test -f "windows-assets/agh-${VERSION}-windows-amd64.zip"
          test -f "windows-assets/agh-${VERSION}-windows-arm64.zip"

      - name: Create GitHub Release
        uses: >-
          softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: |
            windows-assets/agh-${{ env.VERSION }}-windows-amd64.zip
            windows-assets/agh-${{ env.VERSION }}-windows-arm64.zip

  update-homebrew:
    name: Update Homebrew tap
    runs-on: macos-latest
    permissions:
      contents: read
    needs:
      - validate
      - publish-pypi
      - publish-ghcr
      - github-release

    steps:
      - name: Tap Homebrew repository
        id: tap
        run: |
          brew tap giulianotesta7/homebrew-tap
          tap_dir=$(brew --repository giulianotesta7/homebrew-tap)
          echo "dir=${tap_dir}" >> "$GITHUB_OUTPUT"

      - name: Update formula from PyPI
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TAP_DIR: ${{ steps.tap.outputs.dir }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          version = os.environ["VERSION"]
          formula_path = Path(os.environ["TAP_DIR"]) / "Formula/agh.rb"
          data_url = "https://pypi.org/pypi/agh/json"

          with urllib.request.urlopen(data_url, timeout=30) as response:
              payload = json.load(response)

          release_files = payload["releases"].get(version, [])
          sdist = next(
              (
                  item for item in release_files
                  if item.get("packagetype") == "sdist"
              ),
              None,
          )
          if sdist is None:
              raise SystemExit(f"No sdist found on PyPI for agh {version}")

          url = sdist["url"]
          with urllib.request.urlopen(url, timeout=30) as response:
              sha256 = hashlib.sha256(response.read()).hexdigest()

          text = formula_path.read_text(encoding="utf-8")
          url_pattern = (
              r'url "https://files\.pythonhosted\.org/[^"]+'
              r'/agh-[^"]+\.tar\.gz"'
          )
          text, url_replacements = re.subn(
              url_pattern,
              f'url "{url}"',
              text,
              count=1,
          )
          text, sha_replacements = re.subn(
              r'sha256 "[0-9a-f]{64}"',
              f'sha256 "{sha256}"',
              text,
              count=1,
          )
          if url_replacements != 1 or sha_replacements != 1:
              raise SystemExit(
                  "Expected to replace exactly one formula URL and sha256; "
                  f"got url={url_replacements}, sha256={sha_replacements}"
              )
          formula_path.write_text(text, encoding="utf-8")

          print(f"Updated agh formula to {version}")
          print(f"sdist: {url}")
          print(f"sha256: {sha256}")
          PY

      - name: Audit formula
        run: brew audit --strict --online giulianotesta7/tap/agh

      - name: Create Homebrew tap pull request
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_DIR: ${{ steps.tap.outputs.dir }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          cd "$TAP_DIR"

          if git diff --quiet -- Formula/agh.rb; then
            echo "Formula/agh.rb is already up to date."
            exit 0
          fi

          branch="agh-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add Formula/agh.rb
          git commit -m "agh ${VERSION}"
          tap_remote="https://x-access-token:${HOMEBREW_TAP_TOKEN}"
          tap_remote="${tap_remote}@github.com/giulianotesta7/homebrew-tap.git"
          git push --force-with-lease "$tap_remote" "$branch"

          source_url="https://github.com/giulianotesta7/AgentGuidanceHub"
          source_url="${source_url}/releases/tag/v${VERSION}"
          pypi_url="https://pypi.org/project/agh/${VERSION}/"
          body=$(cat <<EOF
          Updates \`agh\` to \`${VERSION}\`.

          Source release: ${source_url}
          PyPI package: ${pypi_url}
          EOF
          )
          if gh pr view "$branch" \
            --repo giulianotesta7/homebrew-tap >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --repo giulianotesta7/homebrew-tap \
              --title "agh ${VERSION}" \
              --body "$body"
          else
            gh pr create \
              --repo giulianotesta7/homebrew-tap \
              --head "$branch" \
              --base main \
              --title "agh ${VERSION}" \
              --body "$body"
          fi

  update-scoop:
    name: Update Scoop bucket
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    needs:
      - validate
      - github-release
      - publish-pypi
      - publish-ghcr
      - preflight-scoop
    env:
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download and hash published release assets
        run: |
          set -euo pipefail
          mkdir -p scoop-assets
          base="https://github.com/giulianotesta7/AgentGuidanceHub"
          base+="/releases/download/v${VERSION}"
          AMD64_URL="${base}/agh-${VERSION}-windows-amd64.zip"
          ARM64_URL="${base}/agh-${VERSION}-windows-arm64.zip"
          curl --fail --location --retry 3 --connect-timeout 10 \
            --max-time 120 \
            -o "scoop-assets/agh-${VERSION}-windows-amd64.zip" \
            "$AMD64_URL"
          curl --fail --location --retry 3 --connect-timeout 10 \
            --max-time 120 \
            -o "scoop-assets/agh-${VERSION}-windows-arm64.zip" \
            "$ARM64_URL"
          AMD64_HASH=$(sha256sum \
            "scoop-assets/agh-${VERSION}-windows-amd64.zip" \
            | awk '{print $1}')
          ARM64_HASH=$(sha256sum \
            "scoop-assets/agh-${VERSION}-windows-arm64.zip" \
            | awk '{print $1}')
          echo "AMD64_URL=$AMD64_URL" >> "$GITHUB_ENV"
          echo "ARM64_URL=$ARM64_URL" >> "$GITHUB_ENV"
          echo "AMD64_HASH=$AMD64_HASH" >> "$GITHUB_ENV"
          echo "ARM64_HASH=$ARM64_HASH" >> "$GITHUB_ENV"

      - name: Clone Scoop bucket
        env:
          GH_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: gh repo clone giulianotesta7/scoop-agh scoop-bucket

      - name: Update manifest
        run: |
          python scripts/update_scoop_manifest.py \
            scoop-bucket/bucket/agh.json \
            --version "${VERSION}" \
            --amd64-url "${AMD64_URL}" \
            --amd64-hash "${AMD64_HASH}" \
            --arm64-url "${ARM64_URL}" \
            --arm64-hash "${ARM64_HASH}"

      - name: Create or update Scoop bucket pull request
        env:
          GH_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          set -euo pipefail
          cd scoop-bucket
          if git diff --quiet -- bucket/agh.json; then
            echo "bucket/agh.json is already up to date."
            exit 0
          fi
          branch="agh-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add bucket/agh.json
          git commit -m "agh ${VERSION}"
          auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          auth_header="AUTHORIZATION: basic ${auth}"
          git -c http.https://github.com/.extraheader="$auth_header" \
            push --force-with-lease \
            https://github.com/giulianotesta7/scoop-agh.git "$branch"
          release_url="https://github.com/giulianotesta7/AgentGuidanceHub"
          release_url="${release_url}/releases/tag/v${VERSION}"
          body=$(cat <<EOF
          Updates \`agh\` to \`${VERSION}\`.

          Source release: ${release_url}
          AMD64 asset: ${AMD64_URL} (${AMD64_HASH})
          ARM64 asset: ${ARM64_URL} (${ARM64_HASH})
          EOF
          )
          if gh pr view "$branch" \
            --repo giulianotesta7/scoop-agh >/dev/null 2>&1; then
            pr_url=$(gh pr edit "$branch" \
              --repo giulianotesta7/scoop-agh \
              --title "agh ${VERSION}" \
              --body "$body")
          else
            pr_url=$(gh pr create \
              --repo giulianotesta7/scoop-agh \
              --head "$branch" \
              --base main \
              --title "agh ${VERSION}" \
              --body "$body")
          fi
          echo "::error::Merge ${pr_url}, then rerun update-scoop."
          exit 1
